name: Deploy to GitHub Pages

on:
  push:
    branches: [master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: sitejuju-angular/package-lock.json

      - name: Install dependencies
        run: cd sitejuju-angular && npm ci

      - name: Build Angular (base href for GitHub Pages)
        run: cd sitejuju-angular && npx ng build --configuration production --base-href /sitejuju/

      - name: List build output
        run: ls -la sitejuju-angular/dist/sitejuju-angular/browser/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: sitejuju-angular/dist/sitejuju-angular/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
